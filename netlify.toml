[build]
  command   = "cd client && npm install && npm run build"
  publish   = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Route all /api/* calls to the matching Netlify Function
[[redirects]]
  from   = "/api/:func"
  to     = "/.netlify/functions/:func"
  status = 200

# SPA fallback — always serve index.html for client-side routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
